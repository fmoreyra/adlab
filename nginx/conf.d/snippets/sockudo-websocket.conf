# Sockudo WebSocket (Step 21 - in-app notifications realtime)
# Pusher protocol uses /app/{key} path.
# Include this file inside the HTTPS server block of laboratory.conf
# when using Sockudo for realtime notifications.
location /app/ {
    resolver 127.0.0.11 valid=10s;
    set $sockudo_backend sockudo:6001;
    proxy_pass http://$sockudo_backend;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 86400;
    proxy_send_timeout 86400;
}
